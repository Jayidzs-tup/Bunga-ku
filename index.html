  // ==============================

  const charsPerPage = 7000; // sesuaikan jika ingin halaman lebih panjang/pendek
  const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p);

  // Gabung paragraf menjadi halaman
  const pages = [];
  let current = '';
  paragraphs.forEach(p => {
    if ((current + '\n\n' + p).length > charsPerPage && current.length > 0) {
      pages.push(current.trim());
      current = p;
    } else {
      current += (current ? '\n\n' : '') + p;
    }
  });
  if (current.trim()) pages.push(current.trim());

  let idx = 0;
  const pageEl = document.getElementById('page');
  const indicator = document.getElementById('indicator');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  function render() {
    const lines = pages[idx].split('\n').map(line => {
      if (!line.trim()) return '';
      return `<p>${line}</p>`;
    }).join('');
    pageEl.innerHTML = lines;
    indicator.textContent = `Halaman ${idx + 1} dari ${pages.length}`;
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === pages.length - 1;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  prevBtn.addEventListener('click', () => { if (idx > 0) { idx--; render(); } });
  nextBtn.addEventListener('click', () => { if (idx < pages.length - 1) { idx++; render(); } });

  // Navigasi keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' && idx < pages.length - 1) { idx++; render(); }
    if (e.key === 'ArrowLeft' && idx > 0) { idx--; render(); }
  });

  render();
</script>
